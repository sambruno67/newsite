{% extends "base.html" %}
{% load static i18n %}

{% block title %}Nouveau contact — CRM{% endblock %}

{% block content %}
<div class="min-h-screen bg-slate-50">

  <div class="bg-navy px-[5%] py-6 pt-24">
    <nav class="flex items-center gap-2 mb-3 text-xs">
      <a href="{% url 'crm:dashboard' %}" class="text-sky no-underline hover:underline">CRM</a>
      <span class="text-white/30">›</span>
      <a href="{% url 'crm:liste_contacts' %}" class="text-sky no-underline hover:underline">Contacts</a>
      <span class="text-white/30">›</span>
      <span class="text-white/60">Nouveau</span>
    </nav>
    <h1 class="font-display text-2xl font-bold text-white">Nouveau contact</h1>
  </div>

  <div class="px-[5%] py-8 max-w-3xl">
    <form method="POST" class="bg-white rounded-2xl border border-slate-200 p-8">
      {% csrf_token %}

      <div class="grid grid-cols-1 sm:grid-cols-2 gap-5 mb-5">
        <div>
          <label class="text-xs font-semibold text-slate-400 uppercase tracking-wider block mb-1.5">Prénom</label>
          <input type="text" name="prenom" placeholder="Yacouba"
                 class="w-full bg-slate-50 border border-slate-200 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:border-sky">
        </div>
        <div>
          <label class="text-xs font-semibold text-slate-400 uppercase tracking-wider block mb-1.5">Nom *</label>
          <input type="text" name="nom" required placeholder="Ouédraogo"
                 class="w-full bg-slate-50 border border-slate-200 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:border-sky">
        </div>
        <div>
          <label class="text-xs font-semibold text-slate-400 uppercase tracking-wider block mb-1.5">Email</label>
          <input type="email" name="email" placeholder="contact@example.com"
                 class="w-full bg-slate-50 border border-slate-200 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:border-sky">
        </div>
        <div>
          <label class="text-xs font-semibold text-slate-400 uppercase tracking-wider block mb-1.5">Téléphone</label>
          <input type="tel" name="telephone" placeholder="+226 70 00 00 00"
                 class="w-full bg-slate-50 border border-slate-200 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:border-sky">
        </div>
        <div>
          <label class="text-xs font-semibold text-slate-400 uppercase tracking-wider block mb-1.5">Organisation</label>
          <input type="text" name="organisation" placeholder="ONG, Ministère, Entreprise..."
                 class="w-full bg-slate-50 border border-slate-200 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:border-sky">
        </div>
        <div>
          <label class="text-xs font-semibold text-slate-400 uppercase tracking-wider block mb-1.5">Poste / Fonction</label>
          <input type="text" name="poste" placeholder="Directeur, Ingénieur..."
                 class="w-full bg-slate-50 border border-slate-200 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:border-sky">
        </div>
        <div>
          <label class="text-xs font-semibold text-slate-400 uppercase tracking-wider block mb-1.5">Lieu / Pays</label>
          <input type="text" name="lieu" placeholder="Ouagadougou, BF"
                 class="w-full bg-slate-50 border border-slate-200 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:border-sky">
        </div>
        <div>
          <label class="text-xs font-semibold text-slate-400 uppercase tracking-wider block mb-1.5">Source</label>
          <select name="source" class="w-full bg-slate-50 border border-slate-200 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:border-sky">
            {% for val, label in source_choices %}
            <option value="{{ val }}">{{ label }}</option>
            {% endfor %}
          </select>
        </div>
        <div>
          <label class="text-xs font-semibold text-slate-400 uppercase tracking-wider block mb-1.5">Statut</label>
          <select name="statut" class="w-full bg-slate-50 border border-slate-200 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:border-sky">
            {% for val, label in statut_choices %}
            <option value="{{ val }}">{{ label }}</option>
            {% endfor %}
          </select>
        </div>
        <div>
          <label class="text-xs font-semibold text-slate-400 uppercase tracking-wider block mb-1.5">Étape pipeline</label>
          <select name="pipeline" class="w-full bg-slate-50 border border-slate-200 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:border-sky">
            {% for val, label in pipeline_choices %}
            <option value="{{ val }}">{{ label }}</option>
            {% endfor %}
          </select>
        </div>
      </div>

      {# Tags #}
      {% if tags %}
      <div class="mb-5">
        <label class="text-xs font-semibold text-slate-400 uppercase tracking-wider block mb-2">Tags</label>
        <div class="flex flex-wrap gap-2">
          {% for tag in tags %}
          <label class="flex items-center gap-1.5 cursor-pointer">
            <input type="checkbox" name="tags" value="{{ tag.pk }}" class="accent-sky">
            <span class="text-sm text-slate-700">{{ tag.nom }}</span>
          </label>
          {% endfor %}
        </div>
      </div>
      {% endif %}

      {# Notes #}
      <div class="mb-6">
        <label class="text-xs font-semibold text-slate-400 uppercase tracking-wider block mb-1.5">Notes internes</label>
        <textarea name="notes" rows="3" placeholder="Observations, contexte..."
                  class="w-full bg-slate-50 border border-slate-200 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:border-sky resize-none"></textarea>
      </div>

      <div class="flex gap-3">
        <button type="submit" class="bg-sky text-white text-sm font-medium px-8 py-3 rounded-lg border-none cursor-pointer hover:bg-sky-dark transition-colors">
          Créer le contact
        </button>
        <a href="{% url 'crm:liste_contacts' %}" class="bg-slate-100 text-slate-600 text-sm font-medium px-8 py-3 rounded-lg no-underline hover:bg-slate-200 transition-colors">
          Annuler
        </a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
